<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SenSante - Pré-diagnostic</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="bg-blue-600 text-white py-4 shadow-lg">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-2xl font-bold">SenSante</h1>

            <p class="text-blue-100 text-sm">
                Assistant pré-diagnostic médical
            </p>
        </div>
    </header>

    <!-- Contenu principal -->
    <main class="max-w-4xl mx-auto px-4 py-8">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- Colonne gauche : formulaire -->
           <!-- Données générales formulaire -->
<div id="form-section"
     class="bg-white rounded-xl shadow-md p-6">

  <h2 class="text-xl font-bold text-gray-800 mb-4">
    Symptômes du patient
  </h2>

  <!-- Âge -->
  <div class="mb-5">
    <label class="block text-sm font-medium
                   text-gray-700 mb-1">
      Âge
    </label>

    <input type="number" id="age"
           class="w-full border border-gray-300
                  rounded-lg p-3 focus:ring-2
                  focus:ring-blue-600 focus:outline-none"
           placeholder="Ex: 25"
           min="0" max="150">
  </div>

  <!-- Sexe -->
  <div class="mb-5">
    <label class="block text-sm font-medium
                   text-gray-700 mb-1">
      Sexe
    </label>

    <select id="sexe"
            class="w-full border border-gray-300
                   rounded-lg p-3">

      <option value="">Choisir</option>
      <option value="M">Masculin</option>
      <option value="F">Féminin</option>
    </select>
  </div>

  <!-- Température -->
  <div class="mb-5">
    <label class="block text-sm font-medium
                   text-gray-700 mb-1">
      Température (°C)
    </label>

    <input type="number" id="temperature" step="0.1"
           class="w-full border border-gray-300
                  rounded-lg p-3 focus:ring-2
                  focus:ring-blue-600 focus:outline-none"
           placeholder="Ex: 38.5"
           min="35" max="45">
  </div>

  <!-- Tension -->
  <div class="mb-5">
    <label class="block text-sm font-medium
                   text-gray-700 mb-1">
      Tension systolique
    </label>

    <input type="number" id="tension_sys"
           class="w-full border border-gray-300
                  rounded-lg p-3 focus:ring-2
                  focus:ring-blue-600 focus:outline-none"
           placeholder="Ex: 120"
           min="60" max="300">
  </div>

  <!-- Symptômes checkbox -->
  <div class="mb-5">
    <label class="block text-sm font-medium
                   text-gray-700 mb-3">
      Symptômes
    </label>

    <div class="space-y-2">

      <label class="flex items-center">
        <input type="checkbox" id="toux"
               class="rounded text-blue-600 mr-2">
        <span class="text-gray-700">Toux</span>
      </label>

      <label class="flex items-center">
        <input type="checkbox" id="fatigue"
               class="rounded text-blue-600 mr-2">
        <span class="text-gray-700">Fatigue</span>
      </label>

      <label class="flex items-center">
        <input type="checkbox" id="maux_tete"
               class="rounded text-blue-600 mr-2">
        <span class="text-gray-700">Maux de tête</span>
      </label>

    </div>
  </div>

  <!-- Région -->
  <div class="mb-5">
    <label class="block text-sm font-medium
                   text-gray-700 mb-1">
      Région
    </label>

    <select id="region"
            class="w-full border border-gray-300
                   rounded-lg p-3">

      <option value="">Choisir</option>
      <option value="Dakar">Dakar</option>
      <option value="Thies">Thiès</option>
      <option value="Saint-Louis">Saint-Louis</option>
      <option value="Ziguinchor">Ziguinchor</option>
      <option value="Tambacounda">Tambacounda</option>
      <option value="Kaolack">Kaolack</option>
      <option value="Diourbel">Diourbel</option>
      <option value="Fatick">Fatick</option>
      <option value="Kolda">Kolda</option>
      <option value="Matam">Matam</option>
    </select>
  </div>

  <!-- Bouton -->
  <button id="diagnostiquer"
          class="w-full bg-blue-600 text-white
                 font-bold py-3 rounded-lg
                 hover:bg-blue-700
                 transition duration-300
                 shadow-md">

    Diagnostiquer
  </button>

</div>

            <!-- Colonne droite : résultat -->
        <div id="result-section">
        <div class="bg-white rounded-xl shadow-md p-6 text-center text-gray-400">
            <p class="text-4xl mb-3">&#129658;</p>
            <p class="font-medium">Remplissez le formulaire</p>
            <p class="text-sm mt-1">puis cliquez sur Diagnostiquer</p>
        </div>
</div>

        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center text-gray-400 text-sm py-4">
        SenSante v0.4 - ESP/UCAD - L2 GLSI 2026
    </footer>

    <!-- JavaScript -->
    <script>
        // URL de l'API (à changer si l'API est ailleurs)
const API_URL = 'http://localhost:8000';

async function diagnostiquer() {

    // 1. Récupérer les valeurs du formulaire
    const patient = {

        age:
            parseInt(document.getElementById('age').value, 10),

        sexe:
            document.getElementById('sexe').value,

        temperature:
            parseFloat(
                document.getElementById('temperature').value
            ),

        tension_sys:
            parseInt(
                document.getElementById('tension_sys').value
            ),

        toux:
            document.getElementById('toux').checked,

        fatigue:
            document.getElementById('fatigue').checked,

        maux_tete:
            document.getElementById('maux_tete').checked,

        region:
            document.getElementById('region').value
    };

    // 2. Vérifier les champs obligatoires
    if (
        isNaN(patient.age) ||
        isNaN(patient.temperature) ||
        isNaN(patient.tension_sys)
    ) {

        afficherErreur('Veuillez remplir tous les champs obligatoires.');

        return;
    }

    // 3. Afficher le spinner de chargement
    afficherChargement();

    try {

        // 4. Envoyer la requête à l'API
        const response = await fetch(
            API_URL + '/predict',
            {
                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify(patient)
            }
        );

        // 5. Vérifier la réponse
        if (!response.ok) {

            let errorText = 'Erreur serveur';
            try {
                const error = await response.json();
                errorText = error.detail || error.message || errorText;
            } catch (e) {
                // non-JSON response
            }

            throw new Error(errorText);
        }

        // 6. Lire le résultat
        const resultat = await response.json();

        // 7. Afficher le résultat
        afficherResultat(resultat);

    } catch (error) {

        afficherErreur(
            'Erreur de connexion : ' + error.message
        );
    }
}

function afficherChargement() {

    const section =
        document.getElementById('result-section');

    section.innerHTML = `
        <div class="bg-white rounded-xl shadow-md p-6">
            
            <div class="flex justify-center items-center">
                
                <div class="animate-spin rounded-full h-12 w-12
                            border-b-2 border-blue-600">
                </div>

            </div>

            <p class="text-gray-500 text-center mt-4">
                Analyse en cours...
            </p>

        </div>
    `;
}


function afficherResultat(r) {

    // Code couleur par diagnostic
    const couleurs = {

        palu: {
            bg: 'bg-red-100',
            text: 'text-red-800',
            badge: 'bg-red-500'
        },

        grippe: {
            bg: 'bg-orange-100',
            text: 'text-orange-800',
            badge: 'bg-orange-500'
        },

        typh: {
            bg: 'bg-yellow-100',
            text: 'text-yellow-800',
            badge: 'bg-yellow-500'
        },

        sain: {
            bg: 'bg-green-100',
            text: 'text-green-800',
            badge: 'bg-green-500'
        }
    };

    const c =
        couleurs[r.diagnostic] || couleurs.sain;

    const pct =
        Math.round(r.probabilite * 100);

    const section =
        document.getElementById('result-section');

    section.innerHTML = `
        <div class="bg-white rounded-xl shadow-md p-6">

            <h2 class="text-xl font-bold text-gray-800 mb-4">
                Résultat
            </h2>

            <div class="${c.bg} rounded-lg p-4 mb-4">

                <p class="text-sm text-gray-600">
                    Diagnostic IA
                </p>

                <p class="text-2xl font-bold ${c.text}">
                    ${r.diagnostic}
                </p>

            </div>

            <div class="mb-4">

                <div class="flex justify-between mb-1">
                    
                    <span class="text-sm text-gray-600">
                        Probabilité
                    </span>

                    <span class="text-sm font-bold">
                        ${pct}%
                    </span>

                </div>

                <div class="w-full bg-gray-200 rounded-full h-3">

                    <div class="${c.badge} h-3 rounded-full
                                transition-all duration-500"
                         style="width: ${pct}%">
                    </div>

                </div>

            </div>

            <div class="mt-4 text-center">

                <span class="bg-gray-100 text-gray-700
                             px-2 py-1 rounded-full text-xs">

                    Confiance:
                    ${r.confiance || 'forte'}

                </span>

            </div>

            <div class="bg-gray-50 rounded-lg p-3 mt-3">

                <p class="text-sm text-gray-700">
                    ${r.message}
                </p>

            </div>

        </div>
    `;

    // NOUVEAU (Lab 5) : appeler /explain automatiquement
    demanderExplication(r);
}


// NOUVEAU (Lab 5) : fonction d'explication via Llama 3
async function demanderExplication(diagnostic_data) {

    // Récupérer les données du formulaire
    const explainData = {
        diagnostic:  diagnostic_data.diagnostic,
        probabilite: diagnostic_data.probabilite,
        age:         parseInt(document.getElementById('age').value),
        sexe:        document.getElementById('sexe').value,
        temperature: parseFloat(document.getElementById('temperature').value),
        region:      document.getElementById('region').value
    };

    // Zone d'explication dans la result-section
    const section = document.getElementById('result-section');

    // Ajouter un placeholder "Génération en cours..."
    const explDiv = document.createElement('div');
    explDiv.id = 'explication-zone';
    explDiv.innerHTML = `
        <div class="mt-4 bg-purple-50 rounded-lg p-4
                    border border-purple-200">
            <p class="text-sm text-purple-600 font-medium mb-2">
                Explication (Llama 3)
            </p>
            <p class="text-gray-500 text-sm animate-pulse">
                Génération en cours...
            </p>
        </div>
    `;
    section.querySelector('.bg-white').appendChild(explDiv);

    try {
        const response = await fetch(API_URL + '/explain', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(explainData)
        });

        if (response.ok) {
            const result = await response.json();
            explDiv.innerHTML = `
                <div class="mt-4 bg-purple-50 rounded-lg p-4
                            border border-purple-200">
                    <p class="text-sm text-purple-600 font-medium mb-2">
                        Explication (Llama 3)
                    </p>
                    <p class="text-gray-700 text-sm leading-relaxed">
                        ${result.explication}
                    </p>
                </div>
            `;
        }

    } catch (error) {
        explDiv.innerHTML = `
            <div class="mt-4 bg-gray-50 rounded-lg p-3">
                <p class="text-gray-400 text-sm">
                    Explication non disponible.
                </p>
            </div>
        `;
    }
}


function afficherErreur(msg) {

    const section =
        document.getElementById('result-section');

    section.innerHTML = `
        <div class="bg-red-50 border border-red-200
                    rounded-xl p-6">

            <p class="text-red-700 font-bold">
                Erreur
            </p>

            <p class="text-red-600 text-sm mt-2">
                ${msg || 'Vérifiez votre connexion et réessayez.'}
            </p>

        </div>
    `;
}

// Attacher le bouton
document.getElementById('diagnostiquer')
        .addEventListener('click', diagnostiquer);
    </script>

</body>
</html>
